<style>
  body {
    background: #333;
    margin: 0;
    padding: 50px;
  }

  .parent {
    width: 400px;
    height: 300px;
    background: linear-gradient(red, blue);
    position: relative;
  }

  .child {
    position: absolute;
    bottom: 0;
    left: 0;
    background: black;
    color: white;
    padding: 20px;
    border-top-right-radius: 30px;
  }

  .child::before {
    content: '';
    position: absolute;

    background: transparent;
    border-bottom-left-radius: 30px;
    box-shadow: -15px 15px 0 15px black;
  }

  .child::after {
    content: '';
    position: absolute;

    background: transparent;
    border-bottom-left-radius: 30px;
    box-shadow: -15px 15px 0 15px black;
  }
</style>
<div class='parent'>
  <div class='child'>Hello world</div>
</div>
